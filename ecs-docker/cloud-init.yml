#cloud-config
package_update: true
package_upgrade: true

# packages:
#   - docker-ce
#   - docker-ce-cli
#   - containerd.io
#   - docker-compose-plugin

runcmd:
  #
  # Nextcloud as container. Based on https://github.com/nextcloud/all-in-one#nextcloud-all-in-one
  #
  # Not official
  #- curl -fsSL https://get.docker.com | sh

# Docker APT
  - |
    export DEBIAN_FRONTEND=noninteractive
    apt update
    apt install -y ca-certificates curl
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc

    # Add the repository to Apt sources (Ubuntu 22.04 = jammy):
    echo "Types: deb" > /etc/apt/sources.list.d/docker.sources
    echo "URIs: https://download.docker.com/linux/ubuntu" >> /etc/apt/sources.list.d/docker.sources
    echo "Suites: jammy" >> /etc/apt/sources.list.d/docker.sources
    echo "Components: stable" >> /etc/apt/sources.list.d/docker.sources
    echo "Architectures: amd64" >> /etc/apt/sources.list.d/docker.sources
    echo "Signed-By: /etc/apt/keyrings/docker.asc" >> /etc/apt/sources.list.d/docker.sources

    apt update

  # Install docker
  - export DEBIAN_FRONTEND=noninteractive && apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Start Docker
  - |
    systemctl enable docker
    systemctl start docker
    usermod -aG docker ubuntu

  # Pull and run Nextcloud
  - |
    docker run --init --sig-proxy=false --name nextcloud-aio-mastercontainer --restart always --publish 80:80 --publish 8080:8080 --publish 8443:8443 --volume nextcloud_aio_mastercontainer:/mnt/docker-aio-config --volume /var/run/docker.sock:/var/run/docker.sock:ro ghcr.io/nextcloud-releases/all-in-one:latest

  # Print info
  - |
    echo "Nextcloud is running! Access it at http://$(hostname -I | awk '{print $1}')"

final_message: "Nextcloud POC VM is ready. Docker and Nextcloud are installed."